naftiko: 1.0.0-alpha2
info:
  label: PartnerStack API
  description: 'PartnerStack API. 6 operations. Lead operation: List customers. Self-contained Naftiko capability covering
    one Partnerstack business surface.'
  tags:
  - Partnerstack
  - PartnerStack API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PARTNERSTACK_API_KEY: PARTNERSTACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: partnerstack
    baseUri: https://api.partnerstack.com/api/v2
    description: PartnerStack API business capability. Self-contained, no shared references.
    resources:
    - name: customers
      path: /customers
      operations:
      - name: listcustomers
        method: GET
        description: List customers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: group
          in: query
          type: string
        - name: partner_key
          in: query
          type: string
      - name: createcustomer
        method: POST
        description: Create a customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: deals
      path: /deals
      operations:
      - name: listdeals
        method: GET
        description: List deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: group
          in: query
          type: string
        - name: partner_key
          in: query
          type: string
        - name: customer_key
          in: query
          type: array
    - name: partnerships
      path: /partnerships
      operations:
      - name: listpartnerships
        method: GET
        description: List partnerships
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_by
          in: query
          type: string
        - name: has_sub_id
          in: query
          type: boolean
        - name: include_offers
          in: query
          type: boolean
        - name: include_archived
          in: query
          type: boolean
    - name: rewards
      path: /rewards
      operations:
      - name: listrewards
        method: GET
        description: List rewards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: payment_status
          in: query
          type: string
        - name: order_by
          in: query
          type: string
        - name: company_key
          in: query
          type: string
        - name: group_key
          in: query
          type: string
        - name: customer_key
          in: query
          type: string
        - name: invoice_key
          in: query
          type: string
        - name: keywords
          in: query
          type: string
    - name: transactions
      path: /transactions
      operations:
      - name: listtransactions
        method: GET
        description: List transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_by
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.PARTNERSTACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: partnerstack-rest
    port: 8080
    description: REST adapter for PartnerStack API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/customers
      name: customers
      description: REST surface for customers.
      operations:
      - method: GET
        name: listcustomers
        description: List customers
        call: partnerstack.listcustomers
        with:
          group: rest.group
          partner_key: rest.partner_key
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcustomer
        description: Create a customer
        call: partnerstack.createcustomer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/deals
      name: deals
      description: REST surface for deals.
      operations:
      - method: GET
        name: listdeals
        description: List deals
        call: partnerstack.listdeals
        with:
          group: rest.group
          partner_key: rest.partner_key
          customer_key: rest.customer_key
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/partnerships
      name: partnerships
      description: REST surface for partnerships.
      operations:
      - method: GET
        name: listpartnerships
        description: List partnerships
        call: partnerstack.listpartnerships
        with:
          order_by: rest.order_by
          has_sub_id: rest.has_sub_id
          include_offers: rest.include_offers
          include_archived: rest.include_archived
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rewards
      name: rewards
      description: REST surface for rewards.
      operations:
      - method: GET
        name: listrewards
        description: List rewards
        call: partnerstack.listrewards
        with:
          payment_status: rest.payment_status
          order_by: rest.order_by
          company_key: rest.company_key
          group_key: rest.group_key
          customer_key: rest.customer_key
          invoice_key: rest.invoice_key
          keywords: rest.keywords
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transactions
      name: transactions
      description: REST surface for transactions.
      operations:
      - method: GET
        name: listtransactions
        description: List transactions
        call: partnerstack.listtransactions
        with:
          order_by: rest.order_by
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: partnerstack-mcp
    port: 9090
    transport: http
    description: MCP adapter for PartnerStack API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-customers
      description: List customers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partnerstack.listcustomers
      with:
        group: tools.group
        partner_key: tools.partner_key
      outputParameters:
      - type: object
        mapping: $.
    - name: create-customer
      description: Create a customer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: partnerstack.createcustomer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-deals
      description: List deals
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partnerstack.listdeals
      with:
        group: tools.group
        partner_key: tools.partner_key
        customer_key: tools.customer_key
      outputParameters:
      - type: object
        mapping: $.
    - name: list-partnerships
      description: List partnerships
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partnerstack.listpartnerships
      with:
        order_by: tools.order_by
        has_sub_id: tools.has_sub_id
        include_offers: tools.include_offers
        include_archived: tools.include_archived
      outputParameters:
      - type: object
        mapping: $.
    - name: list-rewards
      description: List rewards
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partnerstack.listrewards
      with:
        payment_status: tools.payment_status
        order_by: tools.order_by
        company_key: tools.company_key
        group_key: tools.group_key
        customer_key: tools.customer_key
        invoice_key: tools.invoice_key
        keywords: tools.keywords
      outputParameters:
      - type: object
        mapping: $.
    - name: list-transactions
      description: List transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: partnerstack.listtransactions
      with:
        order_by: tools.order_by
      outputParameters:
      - type: object
        mapping: $.
